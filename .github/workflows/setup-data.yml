name: Setup data (one-time)

# Builds the real roster + fixtures from API-Football (uses ~a day's free-tier quota),
# regenerates dummy predictions against that real roster so the demo stays coherent, recomputes
# scores, and commits everything. Runs automatically on the first push to main (when the roster
# has no API ids yet) and then self-disables. Can also be run manually.

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if the roster already looks set up"
        type: boolean
        default: false
  # TEMP: trigger the one-time setup via push (the integration can't dispatch workflows).
  # The check job skips automatically once the roster has API ids, so this self-disables.
  push:
    branches: [main]
    paths: [".github/workflows/setup-data.yml"]

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_setup: ${{ steps.c.outputs.needs_setup }}
    steps:
      - uses: actions/checkout@v4
      - id: c
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "needs_setup=true" >> "$GITHUB_OUTPUT"
          elif grep -qE '"apiId": [0-9]' public/data/roster.json; then
            echo "Roster already has API ids — skipping setup."
            echo "needs_setup=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_setup=true" >> "$GITHUB_OUTPUT"
          fi

  setup:
    needs: check
    if: needs.check.outputs.needs_setup == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build roster (teams, players, positions)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: npm run roster

      - name: Pull all fixtures (full refresh)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: npm run fetch -- --full

      - name: Regenerate dummy predictions from the real roster
        run: npm run seed:predictions

      - name: Recompute scores
        run: npm run score

      - name: Commit data
        run: |
          git config user.name "barnito-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- public/data; then
            echo "No data changes."
          else
            git add public/data
            git commit -m "data: initial roster, fixtures & scores from API-Football"
            git push
          fi
