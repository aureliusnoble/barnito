name: Deploy to GitHub Pages

on:
  # Manual-only during the Supabase migration: the new frontend needs the Supabase backend live, so
  # we don't want to auto-replace the working site before `supabase-setup.sh` has run. After setup,
  # run this workflow (Actions → Deploy to GitHub Pages → Run workflow) to publish the new build.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress data commit's deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Set BARNITO_BASE to "/" if you serve from a custom domain or <user>.github.io root.
          BARNITO_BASE: ${{ vars.BARNITO_BASE }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
