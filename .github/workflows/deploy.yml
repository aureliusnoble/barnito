name: Deploy to GitHub Pages

on:
  push:
    # The current repo default branch is the working branch; the github-pages environment only
    # allows its default branch to deploy. We list both so the latest deploys regardless — once
    # you set the default branch to `main`, the working-branch line can be removed.
    branches: [main, claude/barnito-world-cup-tracker-0fjkzn]
    paths-ignore:
      - "TODO.md"
      - "README.md"
  # Data workflows commit with GITHUB_TOKEN, which doesn't trigger `push`; redeploy via workflow_run.
  workflow_run:
    workflows: ["Update match data", "Setup data (one-time)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress data commit's deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Set BARNITO_BASE to "/" if you serve from a custom domain or <user>.github.io root.
          BARNITO_BASE: ${{ vars.BARNITO_BASE }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
