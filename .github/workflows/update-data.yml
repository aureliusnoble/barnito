name: Update match data

on:
  schedule:
    # every 5 minutes (GitHub's minimum). The job self-throttles to ZERO API calls outside live
    # windows, and during a live game it loops internally (~every 75s) for near-live updates.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a full refresh (re-pull all fixtures)"
        type: boolean
        default: false

# Serialise runs so loop iterations never push over each other.
concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # data always lives on main, regardless of the default branch
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Poll & commit (loops while a match is live)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FORCE: ${{ inputs.force && '1' || '' }}
        run: |
          git config user.name "barnito-bot"
          git config user.email "actions@github.com"
          END=$((SECONDS + 230)) # stay under the 5-min cron interval
          while : ; do
            OUT=$(npm run fetch 2>&1) || true
            echo "$OUT" | tail -4
            npm run score >/dev/null 2>&1 || true
            if ! git diff --quiet -- public/data; then
              git add public/data
              git commit -q -m "data: live update"
              git push -q || (git pull --rebase -q origin main && git push -q)
              echo "committed + pushed"
            else
              echo "no changes"
            fi
            # idle (self-throttled) and not forced → one pass is enough
            if [ -z "$FORCE" ] && echo "$OUT" | grep -q "skipping"; then break; fi
            [ $SECONDS -ge $END ] && break
            sleep 75
          done
